apiVersion: apps/v1
kind: Deployment
metadata:
  name: geeko-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: geeko-api
  template:
    metadata:
      labels:
        app: geeko-api
    spec:
      containers:
        - name: geeko-api
          image: "{{ .Values.image.repository }}:{{ .Values.api.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: {{ .Values.api.redisUrl | quote }}
{{- if .Values.tailscale.enabled }}
            - name: SAGE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tailscale.secretName }}
                  key: sage-url
{{- else }}
            - name: SAGE_URL
              value: {{ .Values.api.sageUrl | quote }}
{{- end }}
            - name: TICK_SECONDS
              value: {{ .Values.api.tickSeconds | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
{{- if .Values.tailscale.enabled }}
        - name: tailscale
          image: "tailscale/tailscale:latest"
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tailscale.secretName }}
                  key: authkey
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_USERSPACE
              value: "false"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: dev-net-tun
              mountPath: /dev/net/tun
      volumes:
        - name: tailscale-state
          emptyDir: {}
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
{{- end }}
