image:
  repository: cyrilcuvier/geekoapp  # single Docker Hub repo, one tag per component
  pullPolicy: IfNotPresent

api:
  replicas: 1
  tag: "api-0.1.0"
  redisUrl: "redis://geeko-redis:6379/0"
  sageUrl: ""     # empty in session 1 (no VM, no tailscale sidecar — geeko-api degrades gracefully).
                  # Ignored once tailscale.enabled is true (SAGE_URL then comes from the Secret below).
  tickSeconds: 3

frontend:
  replicas: 1
  tag: "frontend-0.1.3"

tailscale:
  # Disabled by default: session 1 never needs the Sage VM / tailscale sidecar at all.
  # Turn on only for session 2/3, via a values override applied at install/upgrade time in the
  # Rancher UI (never commit "enabled: true" or any real value here).
  enabled: false
  # Secret must be created out-of-band (Rancher UI, geeko-demo namespace) before enabling:
  #   key "authkey"  = a reusable Tailscale auth key (https://login.tailscale.com/admin/settings/keys)
  #   key "sage-url" = e.g. "http://<sage-vm-tailscale-ip>:9000"
  # Neither value is ever stored in this repo.
  secretName: geeko-tailscale-auth

redis:
  # "dockerhub" = the deliberate session-1 anti-pattern (raw community image).
  # "appco"     = the fixed state, deployed via the SUSE Application Collection chart instead
  #               (installed as a *separate* Helm release from apps.rancher.io — see runbook).
  #               When redis.source is "appco", this chart does not deploy its own Redis at all;
  #               set api.redisUrl to point at the AppCo-deployed Redis service instead.
  source: dockerhub
  dockerhubImage: "redis:8.6.4"
