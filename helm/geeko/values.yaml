image:
  repository: cyrilcuvier/geekoapp  # single Docker Hub repo, one tag per component
  pullPolicy: IfNotPresent

api:
  replicas: 1
  tag: "api-0.1.0"
  redisUrl: "redis://geeko-redis:6379/0"
  sageUrl: "http://100.118.103.94:9000"     # Sage VM's stable Tailscale address, reached via the
                  # tailscale sidecar on this pod (no VPN peering between the two networks).
                  # See docs/2026-07-10-demo-matinee-design.md.
  tickSeconds: 3

frontend:
  replicas: 1
  tag: "frontend-0.1.3"

tailscale:
  # Secret must be created out-of-band (Rancher UI, geeko-demo namespace) before install/upgrade:
  # key "authkey" = a reusable Tailscale auth key from https://login.tailscale.com/admin/settings/keys
  authKeySecretName: geeko-tailscale-auth

redis:
  # "dockerhub" = the deliberate session-1 anti-pattern (raw community image).
  # "appco"     = the fixed state, deployed via the SUSE Application Collection chart instead
  #               (installed as a *separate* Helm release from apps.rancher.io — see runbook).
  #               When redis.source is "appco", this chart does not deploy its own Redis at all;
  #               set api.redisUrl to point at the AppCo-deployed Redis service instead.
  source: dockerhub
  dockerhubImage: "redis:8.6.4"
