server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://geeko-api:8000/api/;
    }

    location /healthz {
        proxy_pass http://geeko-api:8000/healthz;
    }
}
